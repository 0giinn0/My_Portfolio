<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Globe</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;width:100%;overflow:hidden}
  body{background:#0a0a0a}
  #globe{position:fixed;inset:0}
</style>
</head>
<body>
<div id="globe"></div>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>
<script>
(function(){
  'use strict';

  var container = document.getElementById('globe');
  if (!container) return;

  var VISITED_IDS = [586, 784, 276, 442, 528, 512, 634];

  var CITIES = [
    { lat: 33.6844, lng: 73.0479, label: 'Islamabad', color: '#f59e0b' },
    { lat: 24.8607, lng: 67.0011, label: 'Karachi', color: '#f59e0b' },
    { lat: 24.4539, lng: 54.3773, label: 'Abu Dhabi', color: '#10b981' },
    { lat: 25.2048, lng: 55.2708, label: 'Dubai', color: '#10b981' },
    { lat: 50.7374, lng: 7.0982, label: 'Bonn', color: '#3b82f6' },
    { lat: 52.5200, lng: 13.4050, label: 'Berlin', color: '#3b82f6' },
    { lat: 49.6117, lng: 6.1319, label: 'Luxembourg', color: '#8b5cf6' },
    { lat: 52.3676, lng: 4.9041, label: 'Amsterdam', color: '#60a5fa' },
    { lat: 23.5880, lng: 58.3829, label: 'Muscat', color: '#f97316' },
    { lat: 25.2854, lng: 51.5310, label: 'Doha', color: '#10b981' }
  ];

  var ARCS = [
    { startLat: 33.6844, startLng: 73.0479, endLat: 24.4539, endLng: 54.3773, color: '#f59e0b' },
    { startLat: 24.4539, startLng: 54.3773, endLat: 25.2048, endLng: 55.2708, color: '#10b981' },
    { startLat: 25.2048, startLng: 55.2708, endLat: 50.7374, endLng: 7.0982, color: '#3b82f6' },
    { startLat: 50.7374, startLng: 7.0982, endLat: 49.6117, endLng: 6.1319, color: '#8b5cf6' },
    { startLat: 50.7374, startLng: 7.0982, endLat: 52.3676, endLng: 4.9041, color: '#60a5fa' },
    { startLat: 25.2048, startLng: 55.2708, endLat: 23.5880, endLng: 58.3829, color: '#f97316' },
    { startLat: 25.2048, startLng: 55.2708, endLat: 25.2854, endLng: 51.5310, color: '#10b981' }
  ];

  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(function(r) { return r.json(); })
    .then(function(top) {
      var countries = topojson.feature(top, top.objects.countries).features;

      var globe = new Globe(container)
        .width(container.clientWidth)
        .height(container.clientHeight)
        .backgroundColor('#0a0a0a')
        .globeImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-dark.jpg')
        .showGraticules(true)
        .showAtmosphere(true)
        .atmosphereColor('#f59e0b')
        .atmosphereAltitude(0.15)
        .polygonsData(countries)
        .polygonCapColor(function(f) {
          return VISITED_IDS.includes(Number(f.id)) ? 'rgba(245,158,11,0.85)' : 'rgba(58,58,74,0.5)';
        })
        .polygonSideColor(function() { return 'rgba(0,0,0,0.02)'; })
        .polygonStrokeColor(function(f) {
          return VISITED_IDS.includes(Number(f.id)) ? '#fbbf24' : '#4a4a5a';
        })
        .polygonAltitude(0.005)
        .pointsData(CITIES)
        .pointLat('lat')
        .pointLng('lng')
        .pointColor('color')
        .pointAltitude(0.07)
        .pointRadius(0.4)
        .pointsMerge(true)
        .labelsData(CITIES)
        .labelLat('lat')
        .labelLng('lng')
        .labelText('label')
        .labelColor('color')
        .labelSize(0.45)
        .labelDotRadius(0.2)
        .labelDotOrientation(function() { return 'bottom'; })
        .arcsData(ARCS)
        .arcStartLat('startLat')
        .arcStartLng('startLng')
        .arcEndLat('endLat')
        .arcEndLng('endLng')
        .arcColor('color')
        .arcAltitude(0.25)
        .arcDashLength(0.35)
        .arcDashGap(0.5)
        .arcDashAnimateTime(2500);

      var controls = globe.controls();
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.8;
      controls.enableZoom = false;

      function resize() {
        globe.width(container.clientWidth).height(container.clientHeight);
      }
      window.addEventListener('resize', resize);
    })
    .catch(function(e) { console.warn('Globe data load failed:', e); });
})();
</script>
</body>
</html>
