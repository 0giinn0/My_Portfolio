<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Standalone Particle Portrait Effect</title>
  <style>
    :root {
      --paper: #f8f6ef;
      --ink: #11120f;
      --green: #173f32;
      --line: rgba(17, 18, 15, .14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: var(--paper);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .particle-demo {
      width: min(100%, 980px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      border: 1px solid var(--line);
      border-radius: 28px;
      overflow: hidden;
      background: rgba(255, 255, 255, .45);
      box-shadow: 0 24px 80px rgba(17, 18, 15, .12);
    }

    .stage {
      min-height: 680px;
      padding: 18px;
      background: #0f120f;
    }

    canvas {
      width: 100%;
      height: 100%;
      min-height: 640px;
      display: block;
      border-radius: 20px;
      background: var(--green);
    }

    .controls {
      display: grid;
      align-content: start;
      gap: 14px;
      padding: 18px;
      border-left: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: .95;
      letter-spacing: -.04em;
      text-transform: uppercase;
    }

    p {
      margin: 0;
      color: rgba(17, 18, 15, .66);
      line-height: 1.45;
      font-size: 14px;
    }

    .group {
      display: grid;
      gap: 8px;
    }

    .label {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 10px;
      text-transform: uppercase;
      color: rgba(17, 18, 15, .58);
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    button {
      min-height: 38px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .55);
      color: var(--ink);
      cursor: pointer;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 10px;
      text-transform: uppercase;
    }

    button[aria-pressed="true"] {
      background: var(--ink);
      color: var(--paper);
    }

    @media (max-width: 760px) {
      .particle-demo {
        grid-template-columns: 1fr;
      }

      .controls {
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .stage,
      canvas {
        min-height: 520px;
      }
    }
  </style>
</head>
<body>
  <main class="particle-demo">
    <section class="stage" aria-label="Particle portrait canvas">
      <canvas id="particle-canvas"></canvas>
    </section>

    <aside class="controls">
      <h1>Particle Portrait</h1>
      <p>Replace the image source in the code, then use the controls to switch between a clear static picture and interactive particle movement.</p>

      <div class="group">
        <span class="label">Mode</span>
        <div class="buttons" data-control="mode">
          <button type="button" data-value="static" aria-pressed="true">Static</button>
          <button type="button" data-value="center" aria-pressed="false">Center</button>
          <button type="button" data-value="off" aria-pressed="false">Free</button>
          <button type="button" data-value="fall" aria-pressed="false">Fall</button>
        </div>
      </div>

      <div class="group">
        <span class="label">Color</span>
        <div class="buttons" data-control="palette">
          <button type="button" data-value="photo" aria-pressed="true">Photo</button>
          <button type="button" data-value="pearl" aria-pressed="false">Pearl</button>
          <button type="button" data-value="green" aria-pressed="false">Green</button>
          <button type="button" data-value="blue" aria-pressed="false">Blue</button>
          <button type="button" data-value="warm" aria-pressed="false">Warm</button>
          <button type="button" data-value="mix" aria-pressed="false">Mix</button>
        </div>
      </div>
    </aside>
  </main>

    /*
      =========================
      HOW IMAGE DETECTION WORKS
      =========================

      1. The image is drawn into a hidden canvas at a smaller sampling size.
      2. Every few pixels, the script reads RGBA color data.
      3. It estimates the background from the image corners.
      4. It keeps pixels that look like useful image detail:
         - alpha is visible
         - different from the corner/background color
         - dark pencil/ink lines OR local edge contrast OR colored areas
      5. Kept pixels become particle targets.
      6. Static mode locks particles to those target positions.
      7. Center, Free, and Fall modes animate away from or back toward those targets.

      transparent cutout, or very pale linework.
    */

    const palettes = {
      pearl: [[243, 240, 232]],
      green: [[137, 214, 176], [72, 151, 112], [219, 231, 220]],
      blue: [[142, 199, 220], [69, 106, 120], [215, 233, 239]],
      warm: [[226, 112, 85], [190, 141, 47], [244, 231, 223]],

    const ctx = canvas.getContext("2d");
    const particles = [];
    const pointer = { x: 0, y: 0, px: 0, py: 0, vx: 0, vy: 0, active: false };

    let height = 0;
    let dpr = 1;
    let scale = 1;
    let mode = "static";
    let palette = "photo";
    let time = 0;

    const settings = {
      sampleWidth: 210,
      sampleStep: 2,
      particleLimit: 2200,

    function resize() {

      canvas.height = Math.floor(height * dpr);

        if (ny < .2) return [235, 197, 126];
        if (ny > .38) return [242, 203, 186];

        [sampleWidth - 3, 2],
        [2, sampleHeight - 3],

      const spread = Math.max(red, green, blue) - Math.min(red, green, blue);
      const centerX = sampleWidth / 2;
      const centerY = sampleHeight / 2;
      const edgeFalloff = Math.hypot((x - centerX) / centerX, (y - centerY) / centerY);
      const backgroundDistance = colorDistance(red, green, blue, bg);
      const notBlank = backgroundDistance > 18 || edge > 10 || spread > 18 || brightness < 235;
      return alpha > 20 && notBlank && edgeFalloff < 1.35;
    }

    function addTarget(targets, pixels, x, y, sampleWidth, sampleHeight) {
      const i = (y * sampleWidth + x) * 4;
      const red = pixels[i];
      const green = pixels[i + 1];
      const blue = pixels[i + 2];
      const brightness = (red + green + blue) / 3;
      const spread = Math.max(red, green, blue) - Math.min(red, green, blue);
      const depth = (128 - brightness) / 128;

      targets.push({
        tx: x - sampleWidth / 2,
        ty: y - sampleHeight / 2 - sampleHeight * .06,
        tz: depth * 72 + (Math.random() - .5) * 18,
        color: liftColor(red, green, blue, brightness, spread, y / sampleHeight),
        size: Math.max(1.1, Math.min(3.2, 2.65 - brightness / 230)),
        depth
      });
    }

    function sampleImage(image) {
      const sampleWidth = settings.sampleWidth;
      const sampleHeight = Math.round(sampleWidth * image.naturalHeight / image.naturalWidth);
      const offscreen = document.createElement("canvas");
      const offscreenCtx = offscreen.getContext("2d", { willReadFrequently: true });
      const targets = [];

      offscreen.width = sampleWidth;
      offscreen.height = sampleHeight;
      offscreenCtx.drawImage(image, 0, 0, sampleWidth, sampleHeight);

      let pixels;
      try {
        pixels = offscreenCtx.getImageData(0, 0, sampleWidth, sampleHeight).data;
      } catch (error) {
        console.warn("Image pixels could not be detected. Use a local server, same-origin image, CORS image, or data URL.");
        return targets;
      }

      const bg = estimateBackground(pixels, sampleWidth, sampleHeight);

      for (let y = 0; y < sampleHeight; y += settings.sampleStep) {
        for (let x = 0; x < sampleWidth; x += settings.sampleStep) {
          const i = (y * sampleWidth + x) * 4;
          const red = pixels[i];
          const green = pixels[i + 1];
          const blue = pixels[i + 2];
          const alpha = pixels[i + 3];
          const brightness = (red + green + blue) / 3;
          const spread = Math.max(red, green, blue) - Math.min(red, green, blue);
          const currentBrightness = brightness;
          const edge = Math.max(
            Math.abs(currentBrightness - pixelBrightness(pixels, x + settings.sampleStep, y, sampleWidth, sampleHeight)),
            Math.abs(currentBrightness - pixelBrightness(pixels, x, y + settings.sampleStep, sampleWidth, sampleHeight))
          );

          if (keepPixel({ red, green, blue, alpha, x, y, sampleWidth, sampleHeight, bg, edge }) && targets.length < settings.particleLimit) {
            addTarget(targets, pixels, x, y, sampleWidth, sampleHeight);
          }
        }
      }

      const usedFallback = targets.length < 80;

      if (targets.length < 80) {
        targets.length = 0;

        for (let y = 0; y < sampleHeight; y += settings.sampleStep) {
          for (let x = 0; x < sampleWidth; x += settings.sampleStep) {
            const i = (y * sampleWidth + x) * 4;
            const red = pixels[i];
            const green = pixels[i + 1];
            const blue = pixels[i + 2];
            const alpha = pixels[i + 3];
            const brightness = (red + green + blue) / 3;
            const edge = Math.max(
              Math.abs(brightness - pixelBrightness(pixels, x + settings.sampleStep, y, sampleWidth, sampleHeight)),
              Math.abs(brightness - pixelBrightness(pixels, x, y + settings.sampleStep, sampleWidth, sampleHeight))
            );

            if (keepPixelFallback({ red, green, blue, alpha, x, y, sampleWidth, sampleHeight, bg, edge }) && targets.length < settings.particleLimit) {
              addTarget(targets, pixels, x, y, sampleWidth, sampleHeight);
            }
          }
        }
      }

      targets.usedFallback = usedFallback;
      return targets;
    }

    function buildParticles(targets) {
      particles.length = 0;

      targets.forEach((target, index) => {
        const angle = index * .618;
        const spread = Math.max(width, height) * (.28 + Math.random() * .32);
        const startStatic = mode === "static";

        particles.push({
          bx: target.tx,
          by: target.ty,
          bz: target.tz,
          x: startStatic ? target.tx * scale : Math.cos(angle) * spread,
          y: startStatic ? target.ty * scale : Math.sin(angle) * spread,
          z: startStatic ? target.tz : (Math.random() - .5) * 280,
          vx: 0,
          vy: 0,
          vz: 0,
          color: target.color,
          size: target.size,
          depth: target.depth
        });
      });
    }

    function loadImage(src = IMAGE_SRC) {
      const image = new Image();
      image.onload = () => {
        const targets = sampleImage(image);
        if (!targets.length) {
          console.warn("No readable pixels found.");
          return;
        }

        buildParticles(targets);
        console.info(`${targets.length} particles detected${targets.usedFallback ? " / fallback" : ""}`);
      };
      image.onerror = () => {
        console.warn("Image could not load:", src);
      };
      image.src = src;
    }

    function particleColor(particle, index) {
      if (palette === "photo") return particle.color;
      const selected = palettes[palette] || palettes.pearl;
      if (palette === "mix") return selected[index % selected.length];
      return selected[Math.floor(((particle.depth + 1) / 2) * selected.length) % selected.length];
    }

    function setMode(nextMode) {
      mode = nextMode;

      particles.forEach((particle) => {
        if (mode === "static") {
          particle.x = particle.bx * scale;
          particle.y = particle.by * scale;
          particle.z = particle.bz;
          particle.vx = 0;
          particle.vy = 0;
          particle.vz = 0;
        }

        if (mode === "off") {
          particle.vx += (Math.random() - .5) * 2.4;
          particle.vy += (Math.random() - .5) * 2.4;
          particle.vz += (Math.random() - .5) * 2.4;
        }

        if (mode === "fall") {
          particle.vy += 5 + Math.random() * 3;
          particle.vx += (Math.random() - .5) * 2;
        }
      });
    }

    function applyPointerForce(particle) {
      if (!pointer.active || mode === "static") return;

      const perspective = 560 / (560 - particle.z);
      const screenX = particle.x * perspective;
      const screenY = particle.y * perspective;
      const dx = screenX - pointer.x;
      const dy = screenY - pointer.y;
      const distSq = dx * dx + dy * dy;
      const influence = settings.cursorRadius * settings.cursorRadius;

      if (distSq < influence) {
        const dist = Math.sqrt(distSq) || 1;
        const force = (1 - dist / settings.cursorRadius) * 1.3;
        particle.vx += (dx / dist) * force + pointer.vx * .045;
        particle.vy += (dy / dist) * force + pointer.vy * .045;
        particle.vz += force * 4.2;
        particle.vx += -dy * .0032 * force;
        particle.vy += dx * .0032 * force;
      }
    }

    function draw() {
      time += .012;
      ctx.clearRect(0, 0, width, height);

      let cx = 0;
      let cy = 0;
      let cz = 0;

      particles.forEach((particle) => {
        cx += particle.x;
        cy += particle.y;
        cz += particle.z;
      });

      cx /= particles.length || 1;
      cy /= particles.length || 1;
      cz /= particles.length || 1;

      particles.forEach((particle) => {
        const targetX = particle.bx * scale;
        const targetY = particle.by * scale;
        const targetZ = particle.bz;
        const wave = Math.sin(time + particle.depth * 3.2 + particle.bx * .03) * .18;

        if (mode === "static") {
          particle.x += (targetX - particle.x) * .42;
          particle.y += (targetY - particle.y) * .42;
          particle.z += (targetZ - particle.z) * .42;
          particle.vx = 0;
          particle.vy = 0;
          particle.vz = 0;
        }

        if (mode === "center") {
          particle.vx += (targetX - particle.x) * .016 + (cx - particle.x) * .0016 + wave;
          particle.vy += (targetY - particle.y) * .016 + (cy - particle.y) * .0016;
          particle.vz += (targetZ - particle.z) * .016 + (cz - particle.z) * .0016;
        }

        if (mode === "off") {
          particle.vx += Math.sin(time * 1.7 + particle.by * .035 + particle.depth) * .055;
          particle.vy += Math.cos(time * 1.4 + particle.bx * .035) * .055;
          particle.vz += Math.sin(time * 1.2 + particle.depth * 4) * .05;
          if (Math.abs(particle.x) > width * .62) particle.vx += -Math.sign(particle.x) * .12;
          if (Math.abs(particle.y) > height * .62) particle.vy += -Math.sign(particle.y) * .12;
        }

        if (mode === "fall") {
          particle.vx += (targetX - particle.x) * .0008 + Math.sin(time + particle.depth * 5) * .018;
          particle.vy += .36;
          particle.vz += (targetZ - particle.z) * .0012;

          if (particle.y > height / 2 + 120) {
            particle.y = -height / 2 - Math.random() * 180;
            particle.x = targetX + (Math.random() - .5) * 70;
            particle.z = targetZ;
            particle.vy = 1.6 + Math.random() * 2.6;
            particle.vx = (Math.random() - .5) * 1.8;
          }
        }

        applyPointerForce(particle);

        const damping = mode === "static" ? 0 : mode === "center" ? .91 : mode === "off" ? .982 : .965;
        particle.vx *= damping;
        particle.vy *= mode === "fall" ? .992 : damping;
        particle.vz *= damping;
        particle.x += particle.vx;
        particle.y += particle.vy;
        particle.z += particle.vz;
      });

      particles
        .slice()
        .sort((a, b) => a.z - b.z)
        .forEach((particle, index) => {
          const perspective = 560 / (560 - particle.z);
          const x = width / 2 + particle.x * perspective;
          const y = height / 2 + particle.y * perspective;
          const depth = Math.max(0, Math.min(1, (particle.z + 90) / 180));
          const alpha = mode === "static" ? .68 + depth * .3 : .42 + depth * .5;
          const size = particle.size * perspective * (1 + depth * (mode === "static" ? .22 : .38));
          const [red, green, blue] = particleColor(particle, index);

          ctx.beginPath();
          ctx.fillStyle = `rgba(${red}, ${green}, ${blue}, ${alpha})`;
          ctx.arc(x, y, size, 0, Math.PI * 2);
          ctx.fill();
        });

      window.requestAnimationFrame(draw);
    }

    canvas.addEventListener("pointermove", (event) => {
      const rect = canvas.getBoundingClientRect();
      pointer.px = pointer.x;
      pointer.py = pointer.y;
      pointer.x = event.clientX - rect.left - rect.width / 2;
      pointer.y = event.clientY - rect.top - rect.height / 2;
      pointer.vx = pointer.x - pointer.px;
      pointer.vy = pointer.y - pointer.py;
      pointer.active = true;
    });

    canvas.addEventListener("pointerleave", () => {
      pointer.active = false;
    });

    document.querySelectorAll("[data-control]").forEach((group) => {
      group.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;

        group.querySelectorAll("button").forEach((item) => {
          item.setAttribute("aria-pressed", String(item === button));
        });

        if (group.dataset.control === "mode") setMode(button.dataset.value);
        if (group.dataset.control === "palette") palette = button.dataset.value;
      });
    });

    window.addEventListener("resize", resize);

    resize();
    loadImage();
    draw();
  </script>
</body>
</html>
